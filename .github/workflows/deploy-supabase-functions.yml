# Deploy Supabase Edge Functions whenever main updates email functions.
# One-time setup (when at a computer):
#   GitHub → Settings → Secrets and variables → Actions:
#     SUPABASE_ACCESS_TOKEN = (Supabase Account → Access Tokens)
#     SUPABASE_PROJECT_REF  = reangkqbsazwxvrqvsdo  (optional; has default)
# Then pushes to main deploy functions — no local CLI required.

name: Deploy Supabase Edge Functions

on:
  push:
    branches: [main]
    paths:
      - "supabase/functions/**"
      - ".github/workflows/deploy-supabase-functions.yml"
  workflow_dispatch:

jobs:
  deploy:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: supabase/setup-cli@v1
        with:
          version: latest

      - name: Require SUPABASE_ACCESS_TOKEN
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
        run: |
          if [ -z "$SUPABASE_ACCESS_TOKEN" ]; then
            echo "::error::Add GitHub Actions secret SUPABASE_ACCESS_TOKEN (Supabase → Account → Access Tokens). Until then, deploy from a Mac with: supabase functions deploy …"
            exit 1
          fi

      - name: Deploy all lifecycle email functions
        env:
          SUPABASE_ACCESS_TOKEN: ${{ secrets.SUPABASE_ACCESS_TOKEN }}
          PROJECT_REF: ${{ secrets.SUPABASE_PROJECT_REF }}
        run: |
          set -e
          REF="${PROJECT_REF:-reangkqbsazwxvrqvsdo}"
          for fn in welcome-email application-approved intake-received eligibility-refund notify-callie finish-joining intake-reminder; do
            echo "Deploying $fn..."
            supabase functions deploy "$fn" --project-ref "$REF"
          done
